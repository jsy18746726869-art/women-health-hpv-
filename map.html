for(var c in D){
  var data=D[c];
  data.forEach(function(item){
    var icon=item.t==='综合医院'?hospitalIcon:communityIcon;
    var marker=L.marker([item.lat,item.lng],{icon:icon}).addTo(map);
    marker.bindTooltip(item.n,{direction:'top',offset:[0,-16]});
    marker.on('click',function(){showRes(c,item)});
    if(!markers[c])markers[c]=[];
    markers[c].push(marker);
  });
}

function showCampus(campus){
  var coords=campusCoords[campus];
  if(coords){
    map.setView(coords,14,{animate:true,duration:0.5});
    document.getElementById('city-select').value=campus;
    var ul='<h3>'+campusNames[campus]+'</h3><ul>';
    D[campus].forEach(function(item,idx){
      ul+='<li data-idx="'+idx+'" ontouchstart="" onclick="selectHospital(\''+campus+'\','+idx+')"><div class="name">'+item.n+'</div><div class="addr">'+item.a+'</div></li>';
    });
    ul+='</ul>';
    document.getElementById('us').innerHTML=ul;
  }
  for(var c in markers){
    markers[c].forEach(function(m){m.setOpacity(c===campus?1:.3)});
  }
}

function selectHospital(campus,idx){
  var data=D[campus][idx];
  showRes(campus,data);
  var lis=document.querySelectorAll('#us li');
  for(var i=0;i<lis.length;i++)lis[i].classList.remove('active');
  var active=document.querySelector('#us li[data-idx="'+idx+'"]');
  if(active)active.classList.add('active');
}

function showRes(campus,item){
  var typeClass=item.t==='综合医院'?'type-hospital':'type-community';
  var typeIcon=item.t==='综合医院'?'&#128300;':'&#127807;';
  var res='<div class="item"><div class="name">'+item.n+'</div><div class="addr">'+item.a+'</div><div class="info"><span class="'+typeClass+'">'+item.t+'</span><span class="dist">距离 '+item.d+' 米</span></div></div>';
  document.getElementById('res').innerHTML=res;
}

document.getElementById('city-select').addEventListener('change',function(){
  var val=this.value;
  if(val)showCampus(val);
});
